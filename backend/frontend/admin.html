<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin | Equiparação Hospitalar</title>
    <meta name="description" content="Painel administrativo para gerenciar leads.">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="admin-page">
    <!-- Header -->
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="admin-logo">
                🦷 Equiparação Hospitalar - Admin
            </div>
            <div class="admin-user">
                <span style="color: var(--text-secondary);">Administrador</span>
                <button class="admin-logout-btn" onclick="logout()">
                    Sair →
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <div class="admin-container">
        <!-- Stats -->
        <div class="stats-grid" id="stats-container">
            <!-- Preenchido via JavaScript -->
        </div>
        
        <!-- Filters -->
        <div class="filters-section">
            <h3 class="filters-title">Filtros</h3>
            
            <div class="filters-grid">
                <div class="filter-group">
                    <label class="filter-label">Buscar</label>
                    <input 
                        type="text" 
                        id="filter-search" 
                        class="filter-input" 
                        placeholder="Nome, email ou clínica..."
                    >
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Origem</label>
                    <select id="filter-origin" class="filter-select">
                        <option value="">Todas</option>
                        <option value="quiz">Quiz</option>
                        <option value="calculadora">Calculadora</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Viabilidade</label>
                    <select id="filter-viability" class="filter-select">
                        <option value="">Todas</option>
                        <option value="ALTÍSSIMA">Altíssima</option>
                        <option value="ALTA">Alta</option>
                        <option value="MÉDIA">Média</option>
                        <option value="BAIXA">Baixa</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Data Início</label>
                    <input 
                        type="date" 
                        id="filter-start-date" 
                        class="filter-input"
                    >
                </div>
                
                <div class="filter-group">
                    <label class="filter-label">Data Fim</label>
                    <input 
                        type="date" 
                        id="filter-end-date" 
                        class="filter-input"
                    >
                </div>
            </div>
            
            <div class="filters-actions">
                <button class="btn btn-secondary btn-sm" onclick="clearFilters()">
                    Limpar Filtros
                </button>
            </div>
        </div>
        
        <!-- Leads Table -->
        <div class="leads-section">
            <div class="leads-header">
                <h2 class="leads-title">
                    Leads (<span id="leads-count">0</span>)
                </h2>
                <div class="leads-actions">
                    <button class="btn btn-primary btn-sm" onclick="exportLeads()">
                        📥 Exportar CSV
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="location.reload()">
                        🔄 Atualizar
                    </button>
                </div>
            </div>
            
            <div class="leads-table-container">
                <table class="leads-table">
                    <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>Nome/Email</th>
                            <th>Clínica</th>
                            <th>Origem</th>
                            <th>Viabilidade</th>
                            <th>Score</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="leads-table-body">
                        <!-- Preenchido via JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/calculations.js"></script>
    <script src="js/app.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
