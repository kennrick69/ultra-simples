<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ultra Simples</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                },
            },
        };
    </script>

    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        #msgConfirmacao { display: none; }
        #msgConfirmacao.visible { display: block; }
    </style>

    <script src="js/no-autocomplete.js" defer></script>
    <script src="js/notificacoes.js" defer></script>
    <script src="js/alertas-bonitos.js" defer></script>
</head>
<body class="bg-[#F9FAFB] text-[#111827] min-h-screen flex items-center justify-center px-4 py-10">

    <div class="w-full max-w-md">

        <!-- Brand -->
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center gap-2 font-bold text-2xl">
                <i data-lucide="tooth" class="w-7 h-7 text-teal-600"></i>
                <span class="text-[#111827]">Ultra Simples</span>
            </a>
            <p class="mt-2 text-sm text-[#6B7280]">Software odontológico sem complicação</p>
        </div>

        <div class="login-card bg-white rounded-2xl shadow-lg border border-gray-100 p-8">

            <!-- LOGIN -->
            <form id="loginForm">
                <h2 class="text-xl font-bold text-[#111827] mb-6">Entrar na sua conta</h2>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-[#111827] mb-1.5">
                        Email <span class="text-red-500">*</span>
                    </label>
                    <input type="email" id="loginEmail" required placeholder="seu@email.com"
                        class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm placeholder-[#9CA3AF] focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-[#111827] mb-1.5">
                        Senha <span class="text-red-500">*</span>
                    </label>
                    <input type="password" id="loginPassword" required placeholder="Sua senha"
                        class="w-full px-3.5 py-2.5 border border-gray-200 rounded-lg text-sm placeholder-[#9CA3AF] focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent transition">
                </div>

                <button type="submit"
                    class="w-full py-3 bg-teal-600 hover:bg-teal-700 text-white font-semibold rounded-lg text-sm transition-colors shadow-sm">
                    Entrar
                </button>

                <p class="text-center mt-5 text-sm text-[#6B7280]">
                    Não tem conta?
                    <a href="/cadastro" class="text-teal-600 font-semibold hover:text-teal-700 transition-colors">
                        Cadastre-se grátis
                    </a>
                </p>
            </form>

            <!-- AGUARDANDO CONFIRMAÇÃO DE EMAIL -->
            <div id="msgConfirmacao" class="text-center py-4">
                <div class="w-16 h-16 bg-teal-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="mail" class="w-8 h-8 text-teal-600"></i>
                </div>
                <h2 class="text-xl font-bold text-[#111827] mb-2">Verifique seu email</h2>
                <p class="text-sm text-[#6B7280] mb-1">Enviamos um link de confirmação para:</p>
                <p class="text-sm font-semibold text-[#111827] mb-4" id="emailEnviado"></p>
                <p class="text-xs text-[#6B7280] mb-6">Clique no link para ativar sua conta. O link expira em 24 horas.</p>
                <button onclick="reenviarConfirmacaoClick()"
                    class="w-full py-2.5 mb-3 border border-teal-600 text-teal-600 hover:bg-teal-50 font-semibold rounded-lg text-sm transition-colors">
                    Reenviar email
                </button>
                <button onclick="showLogin()"
                    class="w-full py-2.5 bg-gray-100 hover:bg-gray-200 text-[#374151] font-semibold rounded-lg text-sm transition-colors">
                    ← Voltar para login
                </button>
            </div>

        </div>

        <p class="text-center mt-5">
            <a href="/" class="text-sm text-[#6B7280] hover:text-teal-600 transition-colors">
                ← Voltar para página inicial
            </a>
        </p>

    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
    <script src="js/auth.js"></script>
</body>
</html>
