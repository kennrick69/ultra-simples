<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Rápida - Equiparação Hospitalar | Converse com Maria</title>
    <meta name="description" content="Descubra em 2 minutos se sua clínica tem direito à equiparação hospitalar e pode economizar até 70% em impostos.">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/quiz.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="quiz-page">
    <!-- ==================== PROGRESS BAR ==================== -->
    <div class="quiz-container">
        <div class="quiz-progress">
            <div class="progress-header">
                <span class="progress-text" id="progress-text">Pergunta 1 de 7</span>
                <span class="progress-percentage" id="progress-percentage">14%</span>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-bar" style="width: 14%;"></div>
            </div>
        </div>
        
        <!-- ==================== QUIZ CARD ==================== -->
        <div class="quiz-card">
            <!-- Header -->
            <div class="quiz-header">
                <div class="quiz-logo">🦷</div>
                <h1 class="quiz-title">Análise Rápida de Elegibilidade</h1>
                <p class="quiz-subtitle">
                    Responda 7 perguntas e descubra se sua clínica odontológica pode economizar até 70% em impostos
                </p>
            </div>
            
            <!-- Question Container -->
            <div id="question-container">
                <!-- Renderizado dinamicamente pelo quiz.js -->
            </div>
            
            <!-- Navigation -->
            <div class="quiz-navigation">
                <button 
                    id="btn-back" 
                    class="btn btn-back btn-lg nav-button"
                    onclick="previousQuestion()"
                    style="display: none;"
                >
                    ← Voltar
                </button>
                
                <button 
                    id="btn-next" 
                    class="btn btn-accent btn-lg nav-button"
                    onclick="nextQuestion()"
                    disabled
                >
                    Próxima →
                </button>
            </div>
        </div>
        
        <!-- Footer Info -->
        <div style="text-align: center; margin-top: 2rem; color: rgba(255,255,255,0.8); font-size: 0.875rem;">
            <p>
                ✅ 100% Gratuito • ✅ Resultado Imediato • ✅ Sem Compromisso
            </p>
            <p style="margin-top: 0.5rem;">
                <a href="index.html" style="color: rgba(255,255,255,0.9); text-decoration: underline;">
                    ← Voltar para o início
                </a>
            </p>
        </div>
    </div>
    
    <!-- JavaScript -->
    <script src="js/utils.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/calculations.js"></script>
    <script src="js/app.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
